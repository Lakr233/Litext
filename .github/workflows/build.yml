name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: OhMyLitext
            destination: platform=macOS
          - scheme: OhMyLitext
            destination: "platform=macOS,variant=Mac Catalyst"
          - scheme: OhMyLitext
            destination: platform=iOS
          - scheme: OhMyLitext
            destination: platform=iOS Simulator
          - scheme: OhMyLitext
            destination: platform=tvOS
          - scheme: OhMyLitext
            destination: platform=tvOS Simulator
          - scheme: OhMyLitext
            destination: platform=xrOS
          - scheme: OhMyLitext
            destination: platform=xrOS Simulator
          - scheme: OhMyLitextWatch Watch App
            destination: platform=watchOS
          - scheme: OhMyLitextWatch Watch App
            destination: platform=watchOS Simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme "${{ matrix.scheme }}" \
            -workspace Litext.xcworkspace \
            -destination "generic/${{ matrix.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging
