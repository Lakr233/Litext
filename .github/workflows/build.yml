name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install formatting tools
        run: brew install swiftformat swiftlint

      - name: SwiftFormat
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint --strict

  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: OhMyLitext
            destination: platform=macOS
          - scheme: OhMyLitext
            destination: "platform=macOS,variant=Mac Catalyst"
          - scheme: OhMyLitext
            destination: platform=iOS
          - scheme: OhMyLitext
            destination: platform=iOS Simulator
          - scheme: OhMyLitext
            destination: platform=tvOS
          - scheme: OhMyLitext
            destination: platform=tvOS Simulator
          - scheme: OhMyLitext
            destination: platform=xrOS
          - scheme: OhMyLitext
            destination: platform=xrOS Simulator
          - scheme: OhMyLitextWatch Watch App
            destination: platform=watchOS
          - scheme: OhMyLitextWatch Watch App
            destination: platform=watchOS Simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme "${{ matrix.scheme }}" \
            -workspace Litext.xcworkspace \
            -destination "generic/${{ matrix.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging

  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: SwiftPM tests
        run: swift test

      - name: Xcode macOS unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme OhMyLitext \
            -workspace Litext.xcworkspace \
            -destination "platform=macOS" \
            -only-testing:OhMyLitextTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging

      - name: Xcode iOS simulator UI tests
        env:
          LITEXT_SCREENSHOT_DIR: ${{ github.workspace }}/Artworks/RenderingAudit
        run: |
          set -o pipefail
          IOS_SIMULATOR_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$IOS_SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          xcodebuild test \
            -scheme OhMyLitext \
            -workspace Litext.xcworkspace \
            -destination "id=$IOS_SIMULATOR_ID" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging

      - name: Upload rendering audit screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendering-audit-screenshots
          path: Artworks/RenderingAudit/*.png
          if-no-files-found: ignore
